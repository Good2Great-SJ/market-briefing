name: Market Briefing Trigger Check

# 미국장 마감 체크윈도우(싱가폴 07:00~08:45 = UTC 23:00~00:45, 하드스톱 08:00)와
# 한국장 마감 체크윈도우(싱가폴 17:00~18:45 = UTC 09:00~10:45, 하드스톱 18:00) 동안
# 15분 간격으로 trigger.py만 실행 — 원천 콘텐츠(버터대디/증시각도기)가
# 확인되면 그 순간 즉시 briefing.build()가 실행되고, 하드스톱을 넘기면
# 휴장일 여부에 따라 규칙 기반 생성하거나 건너뛴다(trigger.py 참고).
# 하드스톱 이후에도 몇 차례 더 체크하는 이유: GitHub Actions cron은 실행이
# 몇 분 밀리거나 통째로 스킵될 수 있는데, 정확히 하드스톱 순간 한 번만
# 체크하도록 짜면 그 한 번이 밀렸을 때 그날 리포트가 아예 안 나갈 수 있다.
# trigger.py는 이미 발행됐으면 마커로 걸러내므로 여러 번 체크해도 안전하다.
on:
  schedule:
    - cron: "*/15 23 * * *"   # 싱가폴 07:00~07:45
    - cron: "*/15 0 * * *"    # 싱가폴 08:00~08:45 (하드스톱 08:00 포함, 지연 대비 재시도)
    - cron: "*/15 9-10 * * *" # 싱가폴 17:00~18:45 (하드스톱 18:00 포함, 지연 대비 재시도)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout market-briefing
        uses: actions/checkout@v4
        with:
          path: market-briefing

      # 버터대디/증시각도기 최신 수집 상태(state.db)를 읽기 위해 sibling으로 체크아웃.
      # sources.py는 ../naver-blog-kakao-notifier/state.db 경로를 참조한다.
      # 이 저장소는 Private이라 기본 GITHUB_TOKEN(자기 저장소 전용)으로는 접근이 안 되고,
      # 해당 저장소를 읽을 수 있는 개인 액세스 토큰(NOTIFIER_REPO_TOKEN)이 필요하다.
      - name: Checkout naver-blog-kakao-notifier (최신 state.db)
        uses: actions/checkout@v4
        with:
          repository: Good2Great-SJ/naver-blog-kakao-notifier
          path: naver-blog-kakao-notifier
          token: ${{ secrets.NOTIFIER_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: market-briefing
        run: pip install -r requirements.txt

      - name: Run trigger check
        working-directory: market-briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python trigger.py

      - name: Commit trigger markers + 생성된 리포트
        working-directory: market-briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 체크윈도우가 아니어서 trigger.py가 아무것도 안 만들면 out/ 자체가 없을 수 있음(정상)
          if [ -d out ]; then
            git add -f out/
          fi
          # docs/ (GitHub Pages 리포트 아카이브: reports/ + manifest.json)도 함께 커밋
          if [ -d docs ]; then
            git add -f docs/
          fi
          # [skip ci]를 붙이면 GitHub가 이 커밋에 대한 모든 push 트리거 워크플로우를
          # 건너뛰는데, 그러면 docs/ 변경으로 실행돼야 할 Deploy Pages도 함께
          # 스킵되어 리포트가 커밋만 되고 실제 사이트에는 반영이 안 된다(2026-07-20
          # 실제 발생). Trigger Check 자신은 on: push가 없어 재귀 트리거 걱정이
          # 없으므로 [skip ci]를 뺀다.
          git diff --cached --quiet || git commit -m "chore: 데일리 브리핑 자동 생성"
          git push
