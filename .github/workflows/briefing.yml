name: Market Briefing Trigger Check

# 미국장 마감 체크윈도우(싱가폴 07:00~08:45 = UTC 23:00~00:45, 하드스톱 08:00)와
# 한국장 마감 체크윈도우(싱가폴 17:00~18:45 = UTC 09:00~10:45, 하드스톱 18:00) 동안
# 15분 간격으로 trigger.py만 실행 — 원천 콘텐츠(버터대디/증시각도기)가
# 확인되면 그 순간 즉시 briefing.build()가 실행되고, 하드스톱을 넘기면
# 휴장일 여부에 따라 규칙 기반 생성하거나 건너뛴다(trigger.py 참고).
# 하드스톱 이후에도 몇 차례 더 체크하는 이유: GitHub Actions cron은 실행이
# 몇 분 밀리거나 통째로 스킵될 수 있는데, 정확히 하드스톱 순간 한 번만
# 체크하도록 짜면 그 한 번이 밀렸을 때 그날 리포트가 아예 안 나갈 수 있다.
# trigger.py는 이미 발행됐으면 마커로 걸러내므로 여러 번 체크해도 안전하다.
on:
  schedule:
    - cron: "*/15 23 * * *"   # 싱가폴 07:00~07:45
    - cron: "*/15 0 * * *"    # 싱가폴 08:00~08:45 (하드스톱 08:00 포함, 지연 대비 재시도)
    - cron: "*/15 9-10 * * *" # 싱가폴 17:00~18:45 (하드스톱 18:00 포함, 지연 대비 재시도)
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # 봇 커밋 후 Deploy Pages를 workflow_dispatch로 직접 깨우기 위함

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout market-briefing
        uses: actions/checkout@v4
        with:
          path: market-briefing

      # 버터대디/증시각도기 최신 수집 상태(state.db)를 읽기 위해 sibling으로 체크아웃.
      # sources.py는 ../naver-blog-kakao-notifier/state.db 경로를 참조한다.
      # 이 저장소는 Private이라 기본 GITHUB_TOKEN(자기 저장소 전용)으로는 접근이 안 되고,
      # 해당 저장소를 읽을 수 있는 개인 액세스 토큰(NOTIFIER_REPO_TOKEN)이 필요하다.
      - name: Checkout naver-blog-kakao-notifier (최신 state.db)
        uses: actions/checkout@v4
        with:
          repository: Good2Great-SJ/naver-blog-kakao-notifier
          path: naver-blog-kakao-notifier
          token: ${{ secrets.NOTIFIER_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: market-briefing
        run: pip install -r requirements.txt

      - name: Run trigger check
        working-directory: market-briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python trigger.py

      - name: Commit trigger markers + 생성된 리포트
        working-directory: market-briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 체크윈도우가 아니어서 trigger.py가 아무것도 안 만들면 out/ 자체가 없을 수 있음(정상)
          if [ -d out ]; then
            git add -f out/
          fi
          # docs/ (GitHub Pages 리포트 아카이브: reports/ + manifest.json)도 함께 커밋
          if [ -d docs ]; then
            git add -f docs/
          fi
          # [skip ci]를 붙이면 GitHub가 이 커밋에 대한 모든 push 트리거 워크플로우를
          # 건너뛰는데, 그러면 docs/ 변경으로 실행돼야 할 Deploy Pages도 함께
          # 스킵되어 리포트가 커밋만 되고 실제 사이트에는 반영이 안 된다(2026-07-20
          # 실제 발생). Trigger Check 자신은 on: push가 없어 재귀 트리거 걱정이
          # 없으므로 [skip ci]를 뺀다.
          # 커밋할 변경사항이 없으면(이미 발행된 세션이라 트리거가 아무것도 안 만든 경우)
          # push 자체를 건너뛴다 — 안 그러면 그 사이 다른 곳(예: 로컬 수동 push)에서
          # origin/main이 앞서 나간 경우 이 무의미한 push가 non-fast-forward로 실패해
          # 잡 전체가 실패 처리된다(2026-07-20 실제 발생, 데이터 손실은 없었음).
          if git diff --cached --quiet; then
            echo "커밋할 변경 없음 — push 생략"
          else
            git commit -m "chore: 데일리 브리핑 자동 생성"
            git pull --rebase --autostash origin main
            git push
            # ⚠ 핵심: 기본 GITHUB_TOKEN으로 push한 커밋은 GitHub의 재귀 방지
            # 정책상 다른 워크플로우의 on: push 트리거를 절대 발동시키지 못한다.
            # 그래서 리포트가 저장소에 커밋만 되고 Deploy Pages가 안 돌아
            # 사이트에는 반영이 안 되는 사고가 반복됐다(2026-07-21~22 실사고,
            # 그동안은 다른 수동 push가 우연히 뒤따라와 가려져 있었음).
            # workflow_dispatch는 이 정책의 예외라서 직접 디스패치한다.
            if git diff --name-only HEAD~1 HEAD | grep -q '^docs/'; then
              curl -sf -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/pages-deploy.yml/dispatches" \
                -d '{"ref":"main"}'
              echo "Deploy Pages 디스패치 완료"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 이메일 발송 실패는 위 커밋 단계 뒤에 검사한다(마커·페이로드가 먼저
      # 커밋돼야 다음 실행이 재시도할 수 있으므로). 플래그가 있으면 잡을
      # 빨간 실패로 표시해 눈에 띄게 한다 — 기존엔 발송 실패가 로그 한 줄로
      # 삼켜져 잡이 초록색이었고, 아무도 눈치채지 못했다.
      - name: 이메일 발송 실패 시 잡을 실패로 표시
        working-directory: market-briefing
        run: |
          if [ -f out/.triggers/EMAIL_FAILED ]; then
            echo "::error::이메일 발송 실패 — 페이로드가 저장돼 있어 다음 실행(15분 내)에서 자동 재발송을 시도합니다"
            exit 1
          fi
