name: Market Briefing Trigger Check

# 미국장 마감 체크윈도우(싱가폴 07:00~12:00 = UTC 23:00~04:00)와
# 한국장 마감 체크윈도우(싱가폴 17:00~23:00 = UTC 09:00~15:00) 동안
# 15분 간격으로 trigger.py만 실행 — 원천 콘텐츠(버터대디/증시각도기)가
# 확인되면 그 순간 즉시 briefing.build()가 실행되고, 확인 안 되면 그냥 종료된다.
on:
  schedule:
    - cron: "*/15 23 * * *"   # 싱가폴 07:00~07:45
    - cron: "*/15 0-4 * * *"  # 싱가폴 08:00~12:45 (하드스톱 12:00 포함)
    - cron: "*/15 9-15 * * *" # 싱가폴 17:00~23:45 (하드스톱 23:00 포함)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout market-briefing
        uses: actions/checkout@v4
        with:
          path: market-briefing

      # 버터대디/증시각도기 최신 수집 상태(state.db)를 읽기 위해 sibling으로 체크아웃.
      # sources.py는 ../naver-blog-kakao-notifier/state.db 경로를 참조한다.
      # 이 저장소는 Private이라 기본 GITHUB_TOKEN(자기 저장소 전용)으로는 접근이 안 되고,
      # 해당 저장소를 읽을 수 있는 개인 액세스 토큰(NOTIFIER_REPO_TOKEN)이 필요하다.
      - name: Checkout naver-blog-kakao-notifier (최신 state.db)
        uses: actions/checkout@v4
        with:
          repository: Good2Great-SJ/naver-blog-kakao-notifier
          path: naver-blog-kakao-notifier
          token: ${{ secrets.NOTIFIER_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: market-briefing
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run trigger check
        working-directory: market-briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python trigger.py

      - name: Commit trigger markers + 생성된 리포트
        working-directory: market-briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 체크윈도우가 아니어서 trigger.py가 아무것도 안 만들면 out/ 자체가 없을 수 있음(정상)
          if [ -d out ]; then
            git add -f out/
            git diff --cached --quiet || git commit -m "chore: 데일리 브리핑 자동 생성 [skip ci]"
          else
            echo "out/ 없음 — 이번 실행에서 트리거된 세션이 없어 커밋할 것이 없습니다(정상)"
          fi
          git push
